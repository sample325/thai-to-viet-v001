<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>สะพานเสียง · Thai ⇄ Việt</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=IBM+Plex+Sans+Thai:wght@400;500;600&family=Be+Vietnam+Pro:wght@500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--paper:#f6f4ef;--ink:#1b1b26;--cinnabar:#d2452b;--jade:#1f7a5c;--muted:#8c8475;--line:#e4dfd3;--card:#fffdf9;--shadow:0 1px 2px rgba(27,27,38,.05)}
*{box-sizing:border-box}html,body{margin:0}
body{background:var(--paper);color:var(--ink);font-family:"IBM Plex Sans Thai",system-ui,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:920px;margin:0 auto;padding:32px 20px 80px}
header{display:flex;align-items:baseline;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:6px}
.brand{font-family:"Fraunces",serif;font-weight:600;font-size:30px;letter-spacing:-.01em;display:flex;align-items:baseline;gap:.4ch}
.brand .arrow{color:var(--cinnabar);font-weight:500}
.tagline{color:var(--muted);font-size:14px;max-width:46ch}
.switch{display:inline-flex;background:var(--card);border:1px solid var(--line);border-radius:999px;padding:4px;margin:20px 0 18px;box-shadow:var(--shadow)}
.switch button{font:inherit;font-weight:500;border:0;background:transparent;color:var(--muted);padding:8px 18px;border-radius:999px;cursor:pointer;transition:.15s}
.switch button.on{background:var(--ink);color:var(--paper)}
.switch button:focus-visible{outline:2px solid var(--cinnabar);outline-offset:2px}
.io{display:grid;gap:14px}
label.fld{font-size:12.5px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted)}
textarea{width:100%;min-height:96px;resize:vertical;font-family:inherit;font-size:22px;line-height:1.45;padding:14px 16px;border:1px solid var(--line);border-radius:14px;background:var(--card);color:var(--ink);box-shadow:var(--shadow)}
textarea:focus{outline:2px solid var(--cinnabar);outline-offset:1px;border-color:transparent}
.hint{font-size:12.5px;color:var(--muted);margin-top:-6px}
.result{margin-top:6px;border:1px solid var(--line);border-radius:14px;background:var(--card);box-shadow:var(--shadow);overflow:hidden}
.result .main{padding:18px 18px 14px;display:flex;align-items:flex-start;justify-content:space-between;gap:14px}
.out-text{font-size:30px;line-height:1.35;word-break:break-word}
.out-text.viet{font-family:"Be Vietnam Pro",sans-serif;font-weight:600}
.out-text.thai{font-family:"IBM Plex Sans Thai",sans-serif;font-weight:500}
.ipa-line{font-family:"IBM Plex Mono",monospace;color:var(--jade);font-size:15px;padding:0 18px 14px;word-break:break-word}
.copy{flex:none;font:inherit;font-size:13px;border:1px solid var(--line);background:var(--paper);color:var(--ink);border-radius:9px;padding:7px 13px;cursor:pointer}
.copy:active{transform:translateY(1px)}
.copy.done{color:var(--jade);border-color:var(--jade)}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-top:16px}
.card{border:1px solid var(--line);border-radius:12px;background:var(--card);padding:12px 12px 10px;box-shadow:var(--shadow)}
.card.oov{border-style:dashed;opacity:.7}
.card .big{font-size:22px;font-weight:600}
.card .big.viet{font-family:"Be Vietnam Pro",sans-serif}
.card .big.thai{font-family:"IBM Plex Sans Thai",sans-serif}
.card .sub{font-family:"IBM Plex Mono",monospace;font-size:13px;color:var(--jade);margin-top:2px;min-height:1.2em}
.card .src{font-size:13px;color:var(--muted);margin-top:2px}
.tone{display:flex;align-items:center;gap:6px;margin-top:8px;color:var(--muted);font-size:11.5px}
.tone svg{display:block}
.note{margin-top:22px;font-size:13px;color:var(--muted);border-left:2px solid var(--cinnabar);padding:2px 0 2px 12px}
.empty{color:var(--muted);padding:22px 18px;font-size:15px}
@media(max-width:520px){.brand{font-size:25px}.out-text{font-size:25px}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">สะพานเสียง<span class="arrow">⇄</span><span style="font-family:'Be Vietnam Pro'">Việt</span></div>
    <div class="tagline">พิมพ์อักษรไทย แล้วอ่านเป็นเสียงไทยด้วยตัวอักษรเวียดนาม พร้อมคำอ่าน IPA และเส้นวรรณยุกต์ · ทำงานในเครื่องล้วน ไม่ส่งข้อมูลออก</div>
  </header>
  <div class="switch" role="tablist">
    <button id="m-fwd" class="on" onclick="setMode('fwd')">ไทย → เวียดนาม</button>
    <button id="m-rev" onclick="setMode('rev')">เวียดนาม → ไทย</button>
  </div>
  <div class="io">
    <div><label class="fld" id="inlabel">ข้อความภาษาไทย</label>
      <textarea id="input" placeholder="สวัสดีครับ ยินดีต้อนรับ" autofocus></textarea></div>
    <div class="hint" id="hint">ตัดคำอัตโนมัติจากพจนานุกรม 9,997 คำที่พบบ่อยที่สุด</div>
  </div>
  <div class="result" id="result"><div class="empty">ผลลัพธ์จะปรากฏที่นี่</div></div>
  <div class="cards" id="cards"></div>
  <div class="note" id="note"></div>
</div>

const ONSET = {kh:"kh",ch:"ch",th:"th",N:"ng",ph:"p",c:"ch",d:"đ",t:"t",n:"n",
  b:"b",p:"p",f:"ph",m:"m",j:"y",r:"r",l:"l",w:"v",s:"x",h:"h",k:"c","?":""};

const VOWEL = {aa:["a","a"],a:["a","ă"],ii:["i","i"],i:["i","i"],UU:["ư","ư"],

  x:["e","e"],oo:["ô","ô"],o:["ô","ô"],OO:["o","o"],O:["o","o"],"@@":["ơ","ơ"],

  uua:["ua","uô"],ua:["ua","uô"]};

const CODA_IPA = {k:"k̚",N:"ŋ",t:"t̚",n:"n",p:"p̚",m:"m",j:"j",w:"w"};
const TONE_IPA = {"0":"˧","1":"˨˩","2":"˥˩","3":"˦˥","4":"˩˩˦"};
const TONE_NAME = {"0":"สามัญ","1":"เอก","2":"โท","3":"ตรี","4":"จัตวา"};
const FRONT = new Set(["e","ê","i","y"]);
const byLen = o => Object.keys(o).sort((a,b)=>b.length-a.length);
const ONSET_KEYS = byLen(ONSET), VOWEL_KEYS = byLen(VOWEL);

function parseSyll(syl){
  let tone="0", s=syl;
  const m=syl.match(/[0-4]$/); if(m){tone=m[0]; s=syl.slice(0,-1);}
  let onset="", i=0;
  while(i<s.length){
    const hit=ONSET_KEYS.find(k=>s.startsWith(k,i));
    if(hit && !"aiueoxO@U".includes(s[i])){onset+=hit; i+=hit.length;} else break;
  }
  const rest=s.slice(i);
  const vowel=VOWEL_KEYS.find(v=>rest.startsWith(v));
  if(!vowel) return [onset,"","",tone];
  return [onset,vowel,rest.slice(vowel.length),tone];
}
function onsetChain(onset, fn){
  let out="", rem=onset;
  while(rem){const hit=ONSET_KEYS.find(k=>rem.startsWith(k)); if(!hit)break; out+=fn(hit); rem=rem.slice(hit.length);}
  return out;
}
function mapOnset(onset, fv){
  return onsetChain(onset, h=>{
    if(h==="k") return FRONT.has(fv)?"k":"c";
    if(h==="N") return FRONT.has(fv)?"ngh":"ng";
    return ONSET[h];
  });
}
function placeTone(v, mark){
  if(!mark) return v;
  let idx;
  if(v==="ia"||v==="ua"||v==="ưa") idx=0;
  else{const prio=["ơ","ư","ê","ô","â","ă","a","e","o","i","u","y"]; idx=0;
    for(const c of prio){const k=v.indexOf(c); if(k>=0){idx=k;break;}}}
  return (v.slice(0,idx+1)+mark+v.slice(idx+1)).normalize("NFC");
}
function renderViet(o,v,c,t){
  if(!v) return "";
  const hasF=["k","N","t","n","p","m"].includes(c);
  let vf=VOWEL[v][hasF?1:0], extra="";
  if(c==="j") extra=vf.endsWith("i")?"":"i";
  else if(c==="w") extra=(vf==="a"||vf==="ă")?"o":"u";
  const vfull=vf+extra;
  return mapOnset(o,vfull[0])+placeTone(vfull,TONE[t])+(CODA[c]||"");
}
function renderIpa(o,v,c,t){
  if(!v) return "";
  return onsetChain(o,h=>ONSET_IPA[h])+VOWEL_IPA[v]+(CODA_IPA[c]||"")+TONE_IPA[t];
}
function renderPhonWord(w){
  const vp=[], ip=[], sy=[];
  for(const s of w.split(/[~']/)){
    if(!s) continue;
    const [o,v,c,t]=parseSyll(s);
    const vt=renderViet(o,v,c,t); if(!vt) continue;
    const ipa=renderIpa(o,v,c,t);
    vp.push(vt); ip.push(ipa); sy.push({viet:vt,ipa,tone:t,tone_name:TONE_NAME[t]});
  }
  return {viet:vp.join(""), ipa:ip.join("."), syllables:sy};
}

// ---------- REVERSE (เวียดนาม -> ไทย, ประมาณ) ----------
const V_ONSET=[["ngh","N"],["kh","kh"],["ch","ch"],["th","th"],["ng","N"],
  ["ph","f"],["gi","j"],["qu","kw"],["đ","d"],["tr","t"],["c","k"],["k","k"],
  ["q","k"],["b","b"],["p","p"],["t","t"],["n","n"],["m","m"],["y","j"],
  ["d","j"],["r","r"],["l","l"],["v","w"],["x","s"],["s","s"],["h","h"]];
const V_VOWEL=[["ươ","UUa"],["uô","uua"],["iê","iia"],["ưa","UUa"],["ua","uua"],
  ["ia","iia"],["ai","aj"],["ao","aw"],["ăm","am"],["ư","UU"],["ơ","@@"],["ê","ee"],
  ["ô","oo"],["ă","a"],["â","@"],["a","aa"],["e","xx"],["i","ii"],["o","OO"],
  ["u","uu"],["y","ii"]];
const V_CODA={c:"k",ng:"N",nh:"N",t:"t",n:"n",p:"p",m:"m"};
const V_TONE={"\u0300":"1","\u0323":"2","\u0301":"3","\u0309":"4","\u0303":"3"};
const TH_ONSET={k:["ก","m"],kh:["ค","l"],N:["ง","l"],c:["จ","m"],ch:["ช","l"],
  d:["ด","m"],t:["ต","m"],th:["ท","l"],n:["น","l"],b:["บ","m"],p:["ป","m"],
  f:["ฟ","l"],m:["ม","l"],j:["ย","l"],r:["ร","l"],l:["ล","l"],w:["ว","l"],
  s:["ส","h"],h:["ห","h"],"?":["อ","m"],kw:["กว","m"]};
const TH_CODA={k:"ก",N:"ง",t:"ด",n:"น",p:"บ",m:"ม",j:"ย",w:"ว"};
const LONG_V=new Set(["aa","ii","UU","uu","ee","xx","oo","OO","@@","iia","UUa","uua"]);
const ABOVE=new Set(["ั","ิ","ี","ึ","ื","็","ํ"]);
const EK="\u0E48",THO="\u0E49",TRI="\u0E4A",CHAT="\u0E4B";

function stripTone(syl){
  const d=syl.normalize("NFD"); let tone="0", base="";
  for(const ch of d){ if(V_TONE[ch]) tone=V_TONE[ch]; else base+=ch; }
  return [base.normalize("NFC"), tone];
}
function vParse(syl){
  let [s,tone]=stripTone(syl.toLowerCase()); let onset="";
  for(const [pat,ph] of V_ONSET){ if(s.startsWith(pat)){onset=ph; s=s.slice(pat.length); break;} }
  let vowel=null;
  for(const [pat,ph] of V_VOWEL){ if(s.startsWith(pat)){vowel=ph; s=s.slice(pat.length); break;} }
  let coda="";
  if(s){ for(const pat of ["ng","nh","c","t","n","p","m","i","o","u"]){
    if(s===pat||s.startsWith(pat)){
      if(V_CODA[pat]) coda=V_CODA[pat]; else if(pat==="i") coda="j"; else coda="w";
      break;
    }}}
  return [onset,vowel,coda,tone];
}
function reverseTone(cls,tone,dead,long){
  if(!dead){
    if(cls==="m") return [false,{"0":"","1":EK,"2":THO,"3":TRI,"4":CHAT}[tone]];
    if(cls==="l"){ if(tone==="0")return[false,""]; if(tone==="2")return[false,EK];
      if(tone==="3")return[false,THO]; if(tone==="1")return[true,EK]; if(tone==="4")return[true,""]; }
    if(cls==="h"){ if(tone==="4")return[false,""]; if(tone==="1")return[false,EK];
      if(tone==="2")return[false,THO]; if(tone==="3")return[false,TRI]; return[true,""]; }
  } else {
    if(cls==="m") return [false,{"1":"","2":THO,"3":TRI,"4":CHAT}[tone]||""];
    if(cls==="l"){ const def=long?"2":"3"; if(tone===def)return[false,""];
      if(tone==="1")return[true,EK]; if(tone==="4")return[true,""];
      if(tone==="2")return[false,EK]; if(tone==="3")return[false,THO]; }
    if(cls==="h"){ if(tone==="1")return[false,""]; if(tone==="2")return[false,THO]; return[false,""]; }
  }
  return [false,""];
}
function renderThai(o,v,c,t){
  if(v===null) return "";
  const [letter,cls]=TH_ONSET[o]||["อ","m"];
  const dead=["k","t","p"].includes(c);
  const long=LONG_V.has(v);
  const [leadH,mark]=reverseTone(cls,t,dead,long);
  const C=(leadH?"ห":"")+letter;
  const F=TH_CODA[c]||"";
  const hasF=["k","N","t","n","p","m","j","w"].includes(c);
  const wrap=(pre="",post="")=>{
    let core;
    if(post && ABOVE.has(post[0])) core=C+post[0]+(mark||"")+post.slice(1);
    else core=C+(mark||"")+post;
    return pre+core+F;
  };
  const A="\u0E30"; // ะ
  const nf={aa:()=>wrap("","า"),a:()=>wrap("",A),ii:()=>wrap("","ี"),i:()=>wrap("","ิ"),
    UU:()=>wrap("","ือ"),U:()=>wrap("","ึ"),uu:()=>wrap("","ู"),u:()=>wrap("","ุ"),
    ee:()=>wrap("เ"),e:()=>wrap("เ",A),xx:()=>wrap("แ"),x:()=>wrap("แ",A),
    oo:()=>wrap("โ"),o:()=>wrap("โ",A),OO:()=>wrap("","อ"),O:()=>wrap("เ","าะ"),
    "@@":()=>wrap("เ","อ"),"@":()=>wrap("เ","อะ"),iia:()=>wrap("เ","ีย"),ia:()=>wrap("เ","ียะ"),
    UUa:()=>wrap("เ","ือ"),Ua:()=>wrap("เ","ือะ"),uua:()=>wrap("","ัว"),ua:()=>wrap("","ัวะ"),
    aj:()=>wrap("ไ"),aw:()=>wrap("เ","า"),am:()=>wrap("","ำ")};
  const ff={aa:()=>wrap("","า"),a:()=>wrap("","ั"),ii:()=>wrap("","ี"),i:()=>wrap("","ิ"),
    UU:()=>wrap("","ื"),U:()=>wrap("","ึ"),uu:()=>wrap("","ู"),u:()=>wrap("","ุ"),
    ee:()=>wrap("เ"),e:()=>wrap("เ","็"),xx:()=>wrap("แ"),x:()=>wrap("แ","็"),
    oo:()=>wrap("โ"),o:()=>wrap(""),OO:()=>wrap("","อ"),O:()=>wrap("","็อ"),
    "@@":()=>wrap("เ","ิ"),"@":()=>wrap("เ","ิ"),iia:()=>wrap("เ","ีย"),ia:()=>wrap("เ","ีย"),
    UUa:()=>wrap("เ","ื"),Ua:()=>wrap("เ","ื"),uua:()=>wrap("","ว"),ua:()=>wrap("","ว"),
    aj:()=>wrap("ไ"),aw:()=>wrap("เ","า"),am:()=>wrap("","ำ")};
  const tbl=hasF?ff:nf, fn=tbl[v];
  return fn?fn():(C+(mark||"")+F);
}
function reverse(text){
  const out=[], sy=[];
  for(const tok of text.trim().split(/\s+/)){
    if(!tok) continue;
    const [o,v,c,t]=vParse(tok);
    const th=renderThai(o,v,c,t);
    out.push(th); sy.push({viet:tok,thai:th});
  }
  return {thai:out.join(""), syllables:sy};
}

// ---------- พจนานุกรม + ตัดคำ ----------
const DICT = new Map(); let MAXLEN = 1;
for(const line of document.getElementById("dict").textContent.split("\n")){
  const t = line.indexOf("\t"); if(t<0) continue;
  const w = line.slice(0,t), ph = line.slice(t+1);
  DICT.set(w, ph); if(w.length>MAXLEN) MAXLEN=w.length;
}
function segmentThai(run){
  const res=[]; let i=0;
  while(i<run.length){
    let m=null;
    for(let L=Math.min(MAXLEN, run.length-i); L>=1; L--){
      const sub=run.slice(i,i+L);
      if(DICT.has(sub)){m=sub; break;}
    }
    if(m){res.push({w:m, phon:DICT.get(m)}); i+=m.length;}
    else{res.push({w:run[i], phon:null}); i++;}
  }
  return res;
}
function convertForward(text){
  const vietParts=[], ipaParts=[], syll=[];
  const tokens=text.split(/([^\u0E00-\u0E4E]+)/);
  for(const tok of tokens){
    if(!tok) continue;
    if(/[\u0E00-\u0E4E]/.test(tok)){
      for(const u of segmentThai(tok)){
        if(u.phon){
          const r=renderPhonWord(u.phon);
          if(r.viet){vietParts.push(r.viet); ipaParts.push(r.ipa);}
          for(const s of r.syllables){s.src=u.w; syll.push(s);}
        }else{
          vietParts.push("["+u.w+"]");
          syll.push({viet:u.w, ipa:"", tone:null, oov:true, src:u.w});
        }
      }
    }else{
      const tt=tok.replace(/\s+/g," ");
      if(vietParts.length) vietParts.push(tt.trim()?tt.trim():"");
    }
  }
  return {viet:vietParts.filter(Boolean).join(" "), ipa:ipaParts.join("  "), syllables:syll};
}

// ---------- UI ----------
let MODE="fwd"; const $=id=>document.getElementById(id);
const NOTE={
  fwd:"เทียบเสียงโดยประมาณ — เสียงพ่นลม ป/พ รวมเป็น p, วรรณยุกต์ไทย 5 เสียงแมปเข้า 5 เสียงเวียดนามที่ใกล้ที่สุด · คำนอกพจนานุกรมจะแสดงใน [วงเล็บ]",
  rev:"เวอร์ชันกลับทางเป็น ‘การประมาณ’ — ถอดเสียงกลับแบบสัทศาสตร์ การสะกดเป็นรูปแบบมาตรฐานหนึ่ง (ไม่ใช่ต้นฉบับ) และสระสั้น-ยาวอาจเพี้ยน เพราะเวียดนามไม่ระบุความยาวสระ"
};
const CONTOUR={"0":[[2,12],[38,12]],"1":[[2,14],[38,20]],"2":[[2,4],[14,4],[38,20]],"3":[[2,16],[38,4]],"4":[[2,16],[16,20],[38,4]]};
function contour(t){const pts=(CONTOUR[t]||CONTOUR["0"]).map(p=>p.join(",")).join(" ");
  return `<svg width="40" height="24" viewBox="0 0 40 24" aria-hidden="true"><polyline points="${pts}" fill="none" stroke="var(--cinnabar)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;}
function esc(s){return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
function setMode(m){MODE=m;
  $("m-fwd").classList.toggle("on",m==="fwd"); $("m-rev").classList.toggle("on",m==="rev");
  $("inlabel").textContent=m==="fwd"?"ข้อความภาษาไทย":"ข้อความเวียดนาม (เว้นวรรคทุกพยางค์)";
  $("input").placeholder=m==="fwd"?"สวัสดีครับ ยินดีต้อนรับ":"xà vằt đi";
  $("hint").textContent=m==="fwd"?"ตัดคำอัตโนมัติจากพจนานุกรม 9,997 คำที่พบบ่อยที่สุด":"พิมพ์พยางค์เวียดนามคั่นช่องว่าง เช่น  pổm rắc mương thai";
  $("note").textContent=NOTE[m]; run();
}
let timer=null;
$("input").addEventListener("input",()=>{clearTimeout(timer);timer=setTimeout(run,140)});
function run(){
  const text=$("input").value.trim();
  if(!text){$("result").innerHTML='<div class="empty">ผลลัพธ์จะปรากฏที่นี่</div>'; $("cards").innerHTML=""; return;}
  if(MODE==="fwd"){
    const d=convertForward(text);
    $("result").innerHTML=`<div class="main"><div class="out-text viet">${esc(d.viet)}</div>
      <button class="copy" onclick="copy(this,this.previousElementSibling.textContent)">คัดลอก</button></div>
      <div class="ipa-line">/${esc(d.ipa)}/</div>`;
    $("cards").innerHTML=d.syllables.map(s=>s.oov?
      `<div class="card oov"><div class="big thai">${esc(s.viet)}</div><div class="src">ไม่พบในพจนานุกรม</div></div>`:
      `<div class="card"><div class="big viet">${esc(s.viet)}</div><div class="sub">${esc(s.ipa)}</div>
        <div class="tone">${contour(s.tone)}<span>${esc(s.tone_name)}</span></div></div>`).join("");
  }else{
    const d=reverse(text);
    $("result").innerHTML=`<div class="main"><div class="out-text thai">${esc(d.thai)}</div>
      <button class="copy" onclick="copy(this,this.previousElementSibling.textContent)">คัดลอก</button></div>`;
    $("cards").innerHTML=d.syllables.map(s=>
      `<div class="card"><div class="big thai">${esc(s.thai)}</div><div class="src">← ${esc(s.viet)}</div></div>`).join("");
  }
}
async function copy(btn,txt){try{await navigator.clipboard.writeText(txt);btn.textContent="คัดลอกแล้ว";btn.classList.add("done");
  setTimeout(()=>{btn.textContent="คัดลอก";btn.classList.remove("done")},1400);}catch(e){}}
setMode("fwd"); $("input").value="สวัสดีครับ ยินดีต้อนรับ"; run();
